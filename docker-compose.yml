version: '3.8'

services:
  # Elasticsearch for SIEM data
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.9.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=changeme
      - xpack.security.authc.api_key.enabled=true
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
     test: ["CMD-SHELL", "curl -u elastic:changeme -s http://localhost:9200 >/dev/null || exit 1"]
     interval: 30s
     timeout: 10s
     retries: 10
    networks:
      - siemgpt-network

  # Kibana for Elasticsearch visualization (optional)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.9.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=changeme
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - siemgpt-network

  # PostgreSQL for application data (production)
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=siemgpt
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=siemgpt
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siemgpt"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siemgpt-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://siemgpt:changeme@postgres:5432/siemgpt
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
      - ELASTICSEARCH_USER=elastic
      - ELASTICSEARCH_PASSWORD=changeme
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEBUG=true
      - LOG_LEVEL=INFO
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    networks:
      - siemgpt-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (optional - usually run with npm run dev)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "5173:5173"
  #   depends_on:
  #     - backend
  #   volumes:
  #     - ./frontend/src:/app/src
  #   environment:
  #     - VITE_API_URL=http://localhost:8000/api/v1
  #   networks:
  #     - siemgpt-network

volumes:
  elasticsearch-data:
  postgres-data:

networks:
  siemgpt-network:
    driver: bridge
